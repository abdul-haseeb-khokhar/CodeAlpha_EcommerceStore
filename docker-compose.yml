version: '3.8'

services:
  server:
    build: ./server
    container_name: ecommerce_server
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./server:/app
      - /app/node_modules
    dns:
     - 8.8.8.8
     - 8.8.4.4
  
  client:
    build: ./client
    container_name: ecommerce_client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    dns:
     - 8.8.8.8
     - 8.8.4.4
